# embernacle-biblical/.github/workflows/notify-parent.yml
name: Notify parent repo on data update

on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger submodule bump in bible-bauhaus
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PARENT_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Bonzai2Carn/bible-bauhaus/dispatches \
            -d '{"event_type":"biblical-data-updated"}'
